[package]
name = "salicin-lang"
version = "0.3.0"
edition = "2021"
description = "The compiler and language specification for the Salicin programming language"
license = "MIT"

[[bin]]
name = "salic"
path = "src/main.rs"

[dependencies]
semver = "1"
serde = { version = "1", features = ["derive"] }
toml = "0.9"
